<!-- quick-create-category.component.html -->
<div class="bg-white border border-blue-200 rounded-lg shadow-lg p-3 w-64">
  <p class="text-xs font-medium text-gray-500 mb-2 uppercase tracking-wide">Nueva categoría</p>

  <div [formGroup]="form" class="space-y-2">
    <input
      #nameInput
      formControlName="name"
      type="text"
      placeholder="Nombre..."
      class="w-full px-2 py-1.5 border rounded text-sm focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400"
      [class.border-red-400]="nameInvalid"
      [class.border-gray-300]="!nameInvalid"
    />
    @if (nameInvalid) {
      <p class="text-xs text-red-500">El nombre es requerido</p>
    }

    <input
      formControlName="description"
      type="text"
      placeholder="Descripción (opcional)"
      class="w-full px-2 py-1.5 border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400"
    />

    <div class="flex gap-2 pt-1">
      <button
        type="button"
        (click)="save()"
        class="flex-1 px-3 py-1.5 bg-blue-600 text-white text-xs font-medium rounded hover:bg-blue-700 transition-colors"
      >
        Crear
      </button>
      <button
        type="button"
        (click)="closed.emit()"
        class="px-3 py-1.5 border border-gray-300 text-gray-600 text-xs rounded hover:bg-gray-50 transition-colors"
      >
        Cancelar
      </button>
    </div>
  </div>
</div>
