<button class="bg-blue-500 rounded-md text-gray-100 hover:bg-blue-900 transition-all justify-self-end px-2 py-2"
(click)="showForm.set(true)">
  AGREGAR
</button>
@if (showForm()) {
  <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-white rounded-lg p-6 w-full max-w-lg mx-4">

      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-semibold">Nuevo Producto</h2>
        <button (click)="showForm.set(false)" class="text-gray-500 hover:text-gray-700">✕</button>
      </div>

      <app-product-form></app-product-form>

    </div>
  </div>
}
<app-product-list></app-product-list>
