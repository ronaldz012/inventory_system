<div class="flex  flex-col  gap-1">
  @if(selectedProductId() === null){
    <app-product-filters [categories]="categories()" [brands]="brands()" (filtersChanged)="onFiltersChange($event)"></app-product-filters>

    <div class="grid grid-cols-[60px_1fr_100px_100px_auto] items-center p-4 bg-gray-300 text-sm">
      <span class="text-gray-500">ID</span>
      <span class="text-gray-500">NOMBRE</span>
      <span class="text-gray-500">STOCK</span>
      <span class="text-gray-500">PRECIO</span>
      <span class="text-gray-500">ACCIONES</span>
    </div>
    @for(product of products(); track $index)
    {
      <app-product-item
        [product]="product"
        (viewDetail)="this.selectedProductId.set($event);"
      />
    }

  }
  @else {
    <app-product-detail
      [productId]="selectedProductId()!"
      (closed)="this.selectedProductId.set(null)">
    </app-product-detail>
  }


</div>
