<div [formGroup]="filtersForm" class="flex flex-wrap items-center gap-4 p-4 bg-white border-b">

  <div class="relative flex-1 max-w-sm">
    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
      <i class="material-icons text-sm">search</i>
    </span>
    <input
      formControlName="filter"
      type="text"
      placeholder="Buscar por nombre o código..."
      class="w-full pl-10 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:bg-white focus:ring-2 focus:ring-slate-900 outline-none transition-all"
    />
  </div>

  <select
    formControlName="categoryId"
    class="px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-slate-900"
  >
    <option [ngValue]="null">Todas las categorías</option>
    @for (category of categories(); track $index)
    {
      <option [ngValue]="category.id">{{category.name}}</option>
    }
  </select>
  <select
    formControlName="categoryId"
    class="px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-slate-900"
  >
    <option [ngValue]="null">Todas las marcas</option>
    @for (brand of brands(); track $index)
    {
      <option [ngValue]="brand.id">{{brand.name}}</option>
    }
  </select>
</div>
