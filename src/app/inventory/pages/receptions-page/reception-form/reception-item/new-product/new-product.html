<!--
  display: contents en el host ‚Üí los divs hijos se alinean directamente
  con el CSS Grid del padre (mismo grid-template-columns que las variantes)

  Columnas: 80px | 1fr | 80px | 96px | 88px | 88px | 100px | 96px | 32px
            toggle | nombre | talle‚Üícateg | color‚Üímarca | p.venta‚Üíg√©nero | cant‚Üíprecio | costo‚Üídescr | subtotal‚Üí... | del
-->

<!-- Toggle Ex / New -->

<div [formGroup]="form()" class="contents group">

  <div class="h-full border-r border-gray-100 flex items-stretch">
    <button
      type="button"
      (click)="switchMode.emit()"
      class="w-full text-[10px] font-bold uppercase bg-blue-600 text-white hover:bg-blue-700 transition-colors"
      title="Cambiar a producto nuevo"
    >
      Exist.
    </button>

  </div>

  <div class="px-2 py-1.5 relative">
    <input
    type="text"
    formControlName="name"
    placeholder="Nombre..."
    class="w-full px-2 py-1.5 border border-transparent rounded text-sm text-gray-900 placeholder-gray-400
             focus:outline-none focus:border-blue-400 focus:bg-white focus:ring-1 focus:ring-blue-400
             group-hover:border-gray-200"
    />

    <div class="px-1 py-1 "></div>

  </div>
</div>
