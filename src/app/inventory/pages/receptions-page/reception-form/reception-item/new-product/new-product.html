<div [formGroup]="form()" class="contents group">

  <div class="px-2 py-1.5 flex items-center justify-center border-r border-gray-100">
    <div class="flex border border-gray-300 rounded overflow-hidden text-[10px]">
      <span class="px-2 py-1 bg-green-600 text-white font-medium">New</span>
      <button type="button" (click)="switchMode.emit()"
              class="px-2 py-1 text-gray-400 hover:bg-gray-100 transition-colors"
              title="Cambiar a producto existente">
        Ex
      </button>
    </div>
  </div>

  <div class="px-1 py-1">
    <input
      type="text"
      formControlName="name"
      placeholder="Nombre del producto..."
      class="w-full px-2 py-1.5 border border-transparent rounded text-sm text-gray-900 placeholder-gray-400
             focus:outline-none focus:border-blue-400 focus:bg-white focus:ring-1 focus:ring-blue-400
             group-hover:border-gray-200"
    />
  </div>

  <div class="px-1 py-1 relative">
    <app-select-from-list
      [options]="categories()"
      [selectedId]="form().get('categoryId')?.value"
      (selected)="onCategorySelected($event)"
      (createNew)="handleCreateCategory($event)"
    />

  </div>

  <div class="px-1 py-1 relative">
    <app-select-from-list
      [options]="brands()"
      [selectedId]="form().get('brandId')?.value"
      (selected)="onBrandSelected($event)"
      (createNew)="handleCreateBrand($event)"
    />

  </div>

  <div class="px-1 py-1 border-l border-gray-100 flex items-center relative group">
    <select
      formControlName="gender"
      class="w-full px-1 py-1.5 border border-transparent rounded text-[11px] font-bold bg-transparent
           focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400
           hover:border-gray-200 cursor-pointer appearance-none text-center transition-colors"
      [class.text-blue-600]="form().controls.gender.value === 0"
      [class.text-indigo-600]="form().controls.gender.value === 1"
      [class.text-pink-600]="form().controls.gender.value === 2"
    >
      @for (opt of genderOptions; track opt.value) {
        <option [ngValue]="opt.value" class="text-gray-700 bg-white">
          {{ opt.label }}
        </option>
      }
    </select>

  </div>

  <div class="px-1 py-1">
    <input
      type="number"
      formControlName="basePrice"
      step="0.5"
      min="0.5"
      placeholder="0.00"
      class="w-full px-2 py-1.5 border border-transparent rounded text-sm text-right font-medium text-blue-700
             focus:outline-none focus:border-blue-400 focus:bg-white focus:ring-1 focus:ring-blue-400
             group-hover:border-gray-200"
    />
  </div>

  <div class="px-1 py-1 col-span-2">
    <input
      type="text"
      formControlName="description"
      placeholder="Descripción (material, temporada...)"
      class="w-full px-2 py-1.5 border border-transparent rounded text-xs italic text-gray-500
             focus:outline-none focus:border-blue-400 focus:bg-white focus:ring-1 focus:ring-blue-400
             group-hover:border-gray-200"
    />
  </div>

  <div class="flex items-center justify-center border-l border-gray-100">
    <button
      type="button"
      (click)="remove.emit()"
      class="p-1.5 text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all"
    >
      <svg class="h-4 w-4"  viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>
</div>
