<div class="max-w-7xl mx-auto py-6 px-6 space-y-6">

  <!-- Header -->
  <div class="flex items-center justify-between">
    <h2 class="text-xl font-semibold text-gray-900">Nueva recepción</h2>

    <button
      type="button"
      (click)="onCancel()"
      class="text-sm text-gray-500 hover:text-gray-700"
    >
      Cancelar
    </button>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">

    <!-- Notas -->
    <div>
      <input
        formControlName="notes"
        placeholder="Notas..."
        class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm"
      />
    </div>

    <!-- Productos -->
    <div class="space-y-3">

      <div class="flex items-center justify-between">
        <h3 class="text-sm font-semibold text-gray-700">Productos</h3>

        <button
          type="button"
          (click)="addItem()"
          class="text-sm text-blue-600 hover:underline"
        >
          + Agregar producto
        </button>
      </div>

      @if (itemsArray.length === 0) {
        <div class="text-center text-sm text-gray-400 py-6 border rounded-lg">
          No hay productos
        </div>
      }

      <!-- 🔥 Aquí está el cambio importante -->
      @for (itemForm of itemsArray.controls; track $index) {

        <div class="border rounded-lg overflow-hidden">

          <!-- Header compacto del producto -->
          <div class="flex items-center justify-between bg-gray-100 px-3 py-2">

            <div class="text-sm font-medium text-gray-800">
              {{  'Producto sin seleccionar' }}
            </div>

            <button
              type="button"
              (click)="removeItem($index)"
              class="text-red-500 hover:text-red-700 text-sm"
            >
              ✕
            </button>

          </div>

          <!-- Contenido -->
          <div class="p-3">

            <!-- reutilizás TODO tu componente -->
            <app-reception-item
              [form]="itemForm"
              [index]="$index"
              (remove)="removeItem($index)"
            />

          </div>

        </div>

      }

    </div>

    <!-- Submit -->
    <div class="flex justify-end gap-3 pt-2 border-t">

      <button
        type="button"
        (click)="onCancel()"
        class="px-4 py-2 text-sm text-gray-600"
      >
        Cancelar
      </button>

      <button
        type="submit"
        [disabled]="isSubmitting()"
        class="px-6 py-2 text-sm bg-blue-600 text-white rounded-md"
      >
        Guardar recepción
      </button>

    </div>

  </form>
</div>
