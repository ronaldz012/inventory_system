<div class="min-h-screen flex items-center justify-center bg-gray-50">
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()"
        class="w-full max-w-md p-8 space-y-6 bg-white rounded-md shadow-lg">

    <h2 class="text-xl font-black">Login</h2>

    <input
      formControlName="email"
      type="email"
      class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-300 outline-none"
      placeholder="email"
    />

    <input
      formControlName="password"
      type="password"
      class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-300 outline-none"
      placeholder="password"
    />

    <button
      type="submit"
      [disabled]="loginForm.invalid"
      class="w-full bg-blue-500 rounded-md text-white py-2 transition-colors hover:bg-blue-800 disabled:bg-gray-300 disabled:cursor-not-allowed">
      Log in
    </button>
  </form>
</div>
