<ul class="flex flex-col gap-1 px-2 overflow-y-auto">
  @for (module of modules(); track module.id) {
    <li class="flex flex-col gap-1">
      <span class="px-3 pt-3 pb-1 text-xs font-bold uppercase text-gray-400 tracking-wider">
        {{ module.name }}
      </span>
      <ul>
        @for (menu of module.features; track menu.route) {
          <li>
            <a class="flex items-center gap-2 mx-2 px-3 py-2 text-sm text-gray-200
           rounded-lg hover:bg-white/10 transition-colors"
               [routerLink]="['/', 'dashboard', module.route, menu.route]">
              <span class="material-icons text-[18px]">{{ menu.icon }}</span>
              {{ menu.name }}
            </a>
          </li>
        }
      </ul>
    </li>
  }
</ul>
