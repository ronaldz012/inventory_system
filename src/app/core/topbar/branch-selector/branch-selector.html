<div class="relative">

  <button
    (click)="isOpen.set(!isOpen())"
    [class.border-gray-300]="isOpen()"
    [class.bg-white]="isOpen()"
    class="flex items-center gap-2 h-[34px] px-3 rounded-lg border border-gray-200
           bg-gray-50 hover:border-gray-300 hover:bg-white transition-all
           min-w-40 cursor-pointer select-none">
    <span class="w-1.5 h-1.5 rounded-full bg-green-500 flex-shrink-0"></span>
    <span class="text-sm font-medium text-gray-900 flex-1 truncate text-left">
      {{ active()?.branchName ?? 'Sin sucursal' }}
    </span>
    <svg
      class="text-gray-400 flex-shrink-0 transition-transform duration-200"
      [class.rotate-180]="isOpen()"
      width="14" height="14" viewBox="0 0 24 24"
      fill="none" stroke="currentColor" stroke-width="2"
      stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 9 12 15 18 9"/>
    </svg>
  </button>

  @if (isOpen()) {
    <div class="absolute top-[calc(100%+6px)] left-0 min-w-[220px] bg-white
                border border-gray-200 rounded-[10px] p-1 z-50">

      <p class="text-[10px] font-medium text-gray-400 uppercase tracking-wider px-2.5 py-1.5">
        Sucursales
      </p>

      @for (branch of available(); track branch.branchId) {
        <button
          (click)="select(branch)"
          [class.bg-gray-50]="branch.branchId === active()?.branchId"
          [class.font-medium]="branch.branchId === active()?.branchId"
          class="flex items-center gap-2.5 w-full px-2.5 py-2 rounded-[7px]
                 text-sm text-gray-800 hover:bg-gray-50 transition-colors text-left">

          <span
            class="w-1.5 h-1.5 rounded-full flex-shrink-0"
            [class.bg-green-500]="branch.branchId === active()?.branchId"
            [class.bg-gray-300]="branch.branchId !== active()?.branchId">
          </span>

          <span class="flex-1 truncate">{{ branch.branchName }}</span>

          @if (branch.branchId === active()?.branchId) {
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5"
                 stroke-linecap="round" stroke-linejoin="round"
                 class="text-gray-500">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          }
        </button>
      }
    </div>
  }

</div>
